name: CI Pipeline

# Trigger the robot whenever you push to main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # The "Build Test" Job
  docker-check:
    runs-on: ubuntu-latest  # Use a fresh Linux server
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🐳 Test Docker Build
        # This tries to build your containers. If this fails, the robot screams.
        run: docker-compose build