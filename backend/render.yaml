databases:
  - name: roomiesync-db
    databaseName: roomiesync
    plan: free

services:
  - type: web
    name: roomiesync-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: roomiesync-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://your-app.vercel.app
